<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ເຂົ້າສູ່ລະບົບ - KSD</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;700&display=swap">
</head>
<body class="auth-page" data-firebase="false" data-login-page="true">

  <div class="auth-card">
    <div class="auth-logo">
      <img src="Image/KSD.svg" alt="KSD" onerror="this.style.display='none'">
      <h2>ເຂົ້າສູ່ລະບົບ</h2>
      <p class="auth-sub">ຍິນດີຕ້ອນຮັບກັບຄືນ KSD ກິ່ງສະດາ</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="auth-input-group">
        <label for="loginPhone">ເບີໂທ</label>
        <input type="tel" id="loginPhone" required placeholder="020 XXXXXXXX" autocomplete="tel">
      </div>
      <div class="auth-input-group">
        <label for="loginPass">ລະຫັດຜ່ານ</label>
        <input type="password" id="loginPass" required placeholder="ພິມລະຫັດຜ່ານ..." autocomplete="current-password">
      </div>
      <button type="submit" class="auth-btn auth-btn-primary" id="loginBtn">🔑 ເຂົ້າສູ່ລະບົບ</button>
    </form>

    <div class="auth-links">
      <a href="register.html">ຍັງບໍ່ມີບັນຊີ? <strong>ສະໝັກສະມາຊິກ</strong></a>
      <a href="index.html">← ກັບໄປໜ້າຫຼັກ</a>
    </div>

    <div class="auth-demo">
      <p>ທົດລອງ Admin:</p>
      <code>02054835745 / 1234</code>
    </div>
  </div>

  <script src="ksd-common.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const phone = document.getElementById('loginPhone').value;
      const pass = document.getElementById('loginPass').value;

      btn.disabled = true;
      btn.textContent = 'ກຳລັງເຂົ້າລະບົບ...';

      const result = loginUser(phone, pass);
      if (result.ok) {
        alert('✅ ເຂົ້າສູ່ລະບົບສຳເລັດ!');
        window.location.href = 'index.html';
      } else {
        alert('❌ ' + result.msg);
        btn.disabled = false;
        btn.textContent = '🔑 ເຂົ້າສູ່ລະບົບ';
      }
    }
  </script>

</body>
</html>
