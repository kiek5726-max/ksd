<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຊຳລະເງິນ - KSD ກິ່ງສະດາ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;700&display=swap">
    <style>
        body { background: #f8fafc; }
        .payment-container {
            text-align: center; padding: 40px 24px;
            background: #fff; border-radius: 16px;
            max-width: 420px; margin: 50px auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .payment-title { color: #008d13; font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        .bank-info-box {
            text-align: left; background: #f1f8f2;
            padding: 16px 20px; border-radius: 10px;
            margin-bottom: 20px; font-size: 15px; line-height: 2;
            border-left: 4px solid #008d13;
        }
        .bank-info-box p { margin: 0; }
        .qr-img-box { margin: 20px auto; }
        .qr-img-box img {
            width: 250px; border: 2px solid #e2e8f0;
            border-radius: 10px; display: none;
        }
        .no-qr-placeholder {
            width: 250px; height: 250px; margin: 0 auto;
            background: #f1f5f9; border: 2px dashed #cbd5e1;
            border-radius: 10px; display: flex;
            align-items: center; justify-content: center;
            color: #94a3b8; font-size: 14px;
        }
        .btn-chat {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; padding: 13px 20px;
            text-decoration: none; border-radius: 8px;
            display: inline-block; margin-top: 16px;
            font-weight: bold; font-size: 16px; width: 100%;
        }
        .btn-home {
            background: linear-gradient(135deg, #008d13, #005a0d);
            color: white; padding: 13px 24px;
            border: none; border-radius: 8px;
            cursor: pointer; margin-top: 12px;
            font-size: 15px; font-family: 'Noto Sans Lao', sans-serif;
            width: 100%;
        }
        .total-box {
            background: #fff3f3; border-radius: 8px;
            padding: 12px; margin-bottom: 16px;
            font-size: 18px; font-weight: 700; color: #ef4444;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2 class="payment-title">💳 ຊຳລະເງິນ</h2>

    <!-- Total -->
    <div class="total-box" id="total-box" style="display:none;">
        ຍອດທີ່ຕ້ອງຊຳລະ: <span id="total-price">0</span> ກີບ
    </div>

    <!-- Bank Info (from localStorage / Firebase) -->
    <div class="bank-info-box">
        <p>🏦 <strong>ທະນາຄານ:</strong> <span id="bankName">Bcel One</span></p>
        <p>👤 <strong>ຊື່ບັນຊີ:</strong> <span id="accountName">Soukpaserth Douangboupha</span></p>
        <p>🔢 <strong>ເລກບັນຊີ:</strong> <span id="accountNumber">610-5655-8895-56</span></p>
    </div>

    <!-- QR Code Image -->
    <div class="qr-img-box">
        <img id="qrImage" src="" alt="QR Code ຊຳລະເງິນ">
        <div class="no-qr-placeholder" id="noQrPlaceholder">
            📷 ຍັງບໍ່ມີ QR Code
        </div>
    </div>

    <a href="https://wa.me/8562054835745" class="btn-chat">
        💬 ແຊັດຫາ Admin 
    </a>

    <button class="btn-home" onclick="window.history.back()">
        ⬅️ ກັບໄປໜ້າກ່ອນ
    </button>
</div>

<script>
(function() {
    // ອ່ານຍອດ: ໃຊ້ cartTotal ທີ່ cart.html save ໄວ້
    // ຖ້າບໍ່ມີ ຫຼື ເປັນ 0 ໃຫ້ຄຳນວນໃໝ່ຈາກ ksd_cart
    let total = Number(localStorage.getItem('cartTotal') || 0);
    if (!total) {
        const cart = JSON.parse(localStorage.getItem('ksd_cart') || '[]');
        total = cart.reduce((s, i) => s + (Number(i.price) * Number(i.quantity || 1)), 0);
    }
    if (total > 0) {
        document.getElementById('total-price').innerText = total.toLocaleString();
        document.getElementById('total-box').style.display = 'block';
    }

    // Load QR image from localStorage (set by admin)
    function applyQR(base64) {
        if (!base64) return;
        const img = document.getElementById('qrImage');
        img.src = base64;
        img.style.display = 'block';
        document.getElementById('noQrPlaceholder').style.display = 'none';
    }

    // Load bank info from localStorage (set by admin)
    function applyBankInfo(info) {
        if (!info) return;
        if (info.bankName)      document.getElementById('bankName').innerText = info.bankName;
        if (info.accountName)   document.getElementById('accountName').innerText = info.accountName;
        if (info.accountNumber) document.getElementById('accountNumber').innerText = info.accountNumber;
    }

    // Read from localStorage first (instant, no Firebase needed)
    applyQR(localStorage.getItem('ksd_payment_qr'));
    try {
        applyBankInfo(JSON.parse(localStorage.getItem('ksd_bank_info') || 'null'));
    } catch {}
})();
</script>

<!-- Firebase module: sync QR + bank info in real time -->
<script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

    const cfg = {
        apiKey: 'AIzaSyB_JcmHbO_kOy9v3rvstiqDoIgBYndRfZI',
        authDomain: 'ksd-kingsada.firebaseapp.com',
        databaseURL: 'https://ksd-kingsada-default-rtdb.firebaseio.com',
        projectId: 'ksd-kingsada',
        storageBucket: 'ksd-kingsada.firebasestorage.app',
        messagingSenderId: '984977062231',
        appId: '1:984977062231:web:39ebfc780ebc875dec2612',
    };
    const app = getApps().length ? getApps()[0] : initializeApp(cfg);
    const db  = getDatabase(app);

    // QR Code from Firebase
    onValue(ref(db, 'settings/paymentQR'), (snap) => {
        const data = snap.val();
        if (data && data.imageBase64) {
            localStorage.setItem('ksd_payment_qr', data.imageBase64);
            const img = document.getElementById('qrImage');
            img.src = data.imageBase64;
            img.style.display = 'block';
            document.getElementById('noQrPlaceholder').style.display = 'none';
        }
    });

    // Bank info from Firebase
    onValue(ref(db, 'settings/bankInfo'), (snap) => {
        const data = snap.val();
        if (!data) return;
        localStorage.setItem('ksd_bank_info', JSON.stringify(data));
        if (data.bankName)      document.getElementById('bankName').innerText = data.bankName;
        if (data.accountName)   document.getElementById('accountName').innerText = data.accountName;
        if (data.accountNumber) document.getElementById('accountNumber').innerText = data.accountNumber;
    });
</script>

</body>
</html>
